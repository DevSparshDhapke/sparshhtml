<body>
    <div class="atmbox">

        <h1>🏦Bank Transaction System🏦</h1>
        <div class="display-box">
            <p>💰Current Balance</p>
            <p id="display-output"></p>
        </div>
        <div class="atmcontainer">
    
            
            <div class="left-atmcontainer">
                <div class="withdraw">
                    <h2 class="withdraw">Withdraw</h2>
                    <p class="p-tag">Amount</p>
                    <input type="number" id="input-two" placeholder="enter your amount">
                    <button class="button-two" onclick="widraw()">Withdraw</button>
                    <p id="display"></p>
                </div>

            </div>
        </div>
    </div>
</body>
<script>
    let balance = 5000;
   
    withdrawAmount = 0;
    document.getElementById("display-output").innerHTML = balance;

    function widraw() {
        withdrawAmount = document.getElementById("input-two").value;
        balance = balance - Number(withdrawAmount);
        document.getElementById("display-output").innerHTML = balance;
        document.getElementById("input-two").value = "";
        document.getElementById("display").innerHTML = "widraw sucsses full";
        
    }
   
</script>
