    <input type="number" id="ui" placeholder="input one">

         <input type="number" id="sm" placeholder="input two">
    <p id="display"></p>
    <button onclick="greater()">Submit</button>

<script>    
   function greater() {
       let a =Number( document.getElementById("ui").value);
       let b =Number( document.getElementById("sm").value); 
       if (b < a) {
        document.getElementById("display").innerHTML="input one is greater"
       }
       else if (a < b) {
         document.getElementById("display").innerHTML="input two is greater"
       } else  {
        document.getElementById("display").innerHTML="the both number are equal"
       }
   }
