<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <!-- css link -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <!-- js link -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</head>

<body>
    <div class="container mt-5">
        <div class="card shadow">
            <div class="card-header bg-primary text-white text-center">
                <h1>Admission form</h1>
            </div>
            <div class="card-body">
                <form>
                    <div class="md-3">
                        <label>full name</label>
                        <input class="form-control" type="text" id="enter your name" placeholder="enter your full name">
                    </div>
                    <div class="md-3">
                        <label>Email</label>
                        <input class="form-control" type="text" id="enter your Email" placeholder="enter your Email">
                    </div>
                    <div class="md-3">
                        <label>Phone Number</label>
                        <input class="form-control" type="text" id="enter your Phone Number"
                            placeholder="enter your Phone Number">
                    </div>
                    <div class="md-3">
                        <label>gender</label>
                        <div class="form-check form-cheack-line">
                            <input class="form-cheack-input" type="radio" name="gender">
                            <label class="form-cheack-label">mail</label>
                        </div>
                    </div>

                    <div class="form-check form-cheack-line">
                        <input class="form-cheack-input" type="radio" name="gender">
                        <label class="form-cheack-label">femail</label>
                    </div>

                    <!-- course -->
                    <div class="md-3">
                        <label class="form-label">Select Corse</label>
                        <select class="form-select">
                            <option selected>choose...!</option>
                            <option>BCA</option>
                            <option>B.com</option>
                            <option>B.E.</option>
                            <option>B.Tech</option>
                        </select>
                        <div class="md-3">
                            <div class="form-label">address</div>
                            <textarea class="form-control" rows="3"></textarea>

                        </div>
                        <div class="md-3 form-check">
                            <input type="checkbox" class="form-check-input">
                            <label class="form-check-label">I agree to terms & conditions</label>
                        </div>
                        <!-- button -->
                        <div class="d-grid">
                            <button class=" btn btn-success" type="submit">submit+</button>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>

</body>

</html>
