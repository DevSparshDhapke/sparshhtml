<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <!-- css link -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <!-- js link -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</head>

<body>
    <div class="container-fluid vh-100 d-flex flex-column">
        <!-- header start  -->
        <div class="d-flex justify-content-between align-items-center p-2 bg-primary text-white">



            <h5>my chat</h5>
            <div class="d-flex gap-5">
                <!-- search icon -->
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-search"
                    viewBox="0 0 16 16">
                    <path
                        d="M11.742 10.344a6.5 6.5 0 1 0-1.397 1.398h-.001q.044.06.098.115l3.85 3.85a1 1 0 0 0 1.415-1.414l-3.85-3.85a1 1 0 0 0-.115-.1zM12 6.5a5.5 5.5 0 1 1-11 0 5.5 5.5 0 0 1 11 0" />
                </svg>
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor"
                    class="bi bi-three-dots-vertical" viewBox="0 0 16 16">
                    <path
                        d="M9.5 13a1.5 1.5 0 1 1-3 0 1.5 1.5 0 0 1 3 0m0-5a1.5 1.5 0 1 1-3 0 1.5 1.5 0 0 1 3 0m0-5a1.5 1.5 0 1 1-3 0 1.5 1.5 0 0 1 3 0" />
                </svg>
            </div>
        </div>


        <!-- header end -->
        <!-- tabs start -->
        <ul class="nav nav-tabs bg-light">
            <li class="nav-item">
                <a class="nav-link active" aria-current="page" href="#"><u>Active</u></a>
            </li>
            <li class="nav-item">
                <a class="nav-link" class="nav-link" href="#"><u>Link</u></a>
            </li>
            <li class="nav-item">
                <a class="nav-link" class="nav-link" href="#"><u>Link</u></a>
            </li>
            <li class="nav-item">
                <a class="nav-link disabled" class="nav-link" aria-disabled="true">Disabled</a>
            </li>
        </ul>
        <!-- tabs end -->
        <div class="row flex-grow-1">
            <div class="col-4 border-end">
                <!-- search bar -->
                <div class="p-2">
                    <input type="text" class="form-control" placeholder="search chat">
                </div>
                <!-- users -->
                <div class="list-group list-group-flush">

                    <!-- user 1  -->
                    <a href="#"
                        class="list-group-item list-group-item-action d-flex justify-content-between align-items-start">
                        <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSPFNeUn89NkscCQdePBFlIp7ixL81eU9pY3g&s"
                            alt="" class="rounded-circle me-2" height="50px">
                        <div>
                            <div>user 1</div>
                            <small>last message..</small>
                        </div>
                        <small>10:30 am</small>
                    </a>


                    <!-- user 2  -->
                    <a href="#"
                        class="list-group-item list-group-item-action d-flex justify-content-between align-items-start">
                        <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRVpcCcQNUGyTpt1jjsWPZVrdEvPHO3kr7Tdg&s"
                            alt="" class="rounded-circle me-2" height="50px">
                        <div>
                            <div>user 2</div>
                            <small>last message..</small>
                        </div>
                        <small>10:30 am</small>
                    </a>

                    <!-- user 3  -->
                    <a href="#"
                        class="list-group-item list-group-item-action d-flex justify-content-between align-items-start">
                        <img src="https://static.vecteezy.com/system/resources/previews/032/176/197/non_2x/business-avatar-profile-black-icon-man-of-user-symbol-in-trendy-flat-style-isolated-on-male-profile-people-diverse-face-for-social-network-or-web-vector.jpg"
                            alt="" class="rounded-circle me-2" height="50px">
                        <div>
                            <div>user 3</div>
                            <small>last message..</small>
                        </div>
                        <small>10:30 am</small>
                    </a>
                </div>
            </div>

            <!-- chat window -->
            <div class="col-8 d-flex flex-column">
                <!-- chat header start -->
                <div class="d-flex align-items-center">
                    <!-- user 1  -->
                    <a href="#"
                        class="list-group-item list-group-item-action d-flex justify-content-between align-items-start">
                        <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSPFNeUn89NkscCQdePBFlIp7ixL81eU9pY3g&s"
                            alt="" class="rounded-circle me-2" height="50px" />
                        <div>
                            <div>user 1</div>
                            <small>Online</small>
                            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor"
                                class="bi bi-telephone" viewBox="0 0 16 16">
                                <path
                                    d="M3.654 1.328a.678.678 0 0 0-1.015-.063L1.605 2.3c-.483.484-.661 1.169-.45 1.77a17.6 17.6 0 0 0 4.168 6.608 17.6 17.6 0 0 0 6.608 4.168c.601.211 1.286.033 1.77-.45l1.034-1.034a.678.678 0 0 0-.063-1.015l-2.307-1.794a.68.68 0 0 0-.58-.122l-2.19.547a1.75 1.75 0 0 1-1.657-.459L5.482 8.062a1.75 1.75 0 0 1-.46-1.657l.548-2.19a.68.68 0 0 0-.122-.58zM1.884.511a1.745 1.745 0 0 1 2.612.163L6.29 2.98c.329.423.445.974.315 1.494l-.547 2.19a.68.68 0 0 0 .178.643l2.457 2.457a.68.68 0 0 0 .644.178l2.189-.547a1.75 1.75 0 0 1 1.494.315l2.306 1.794c.829.645.905 1.87.163 2.611l-1.034 1.034c-.74.74-1.846 1.065-2.877.702a18.6 18.6 0 0 1-7.01-4.42 18.6 18.6 0 0 1-4.42-7.009c-.362-1.03-.037-2.137.703-2.877z" />
                            </svg>
                            <!-- chat header end -->

                        </div>
                    </a>
                </div>
                <!-- massege start -->
                <div>
                    <div class="d-flex mb-2 rounded">
                        <!-- incoming -->
                        <div class="bg-light p-2 rounded">
                            hello!

                        </div>
                    </div>
                    <!-- Outcoming -->
                    <div class="d-flex justify-content-end mb-2 r-5">
                        <div class="bg-primary  text-white p-2 roun">
                            Hii kaise ho aap!
                        </div>
                    </div>

                    <!-- massege end -->

                </div>
                
            </div>
            </div>
            <div class="p-2 border-top">
                <div class="input-group">
                    <button class="btn btn-light"></button>
                    <input type="text" class="form-control" >
                    
                    <button class="btn btn-light" ><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-search" viewBox="0 0 16 16">
  <path d="M11.742 10.344a6.5 6.5 0 1 0-1.397 1.398h-.001q.044.06.098.115l3.85 3.85a1 1 0 0 0 1.415-1.414l-3.85-3.85a1 1 0 0 0-.115-.1zM12 6.5a5.5 5.5 0 1 1-11 0 5.5 5.5 0 0 1 11 0"/>
</svg></button>
                    <button class="btn btn-primary"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-send" viewBox="0 0 16 16">
  <path d="M15.854.146a.5.5 0 0 1 .11.54l-5.819 14.547a.75.75 0 0 1-1.329.124l-3.178-4.995L.643 7.184a.75.75 0 0 1 .124-1.33L15.314.037a.5.5 0 0 1 .54.11ZM6.636 10.07l2.761 4.338L14.13 2.576zm6.787-8.201L1.591 6.602l4.339 2.76z"/>
</svg></button>
                </div>

                <!-- input massege end -->


            </div>
            <!-- input massege start -->
            </div>
        </div>
    </div>
</body>

</html>

</html>

</html>
